baseURL = "https://chusheng.uk/"
title = "初牲的创作站"
defaultContentLanguage = "zh-cn"
enableGitInfo = false

# 摘要长度（首页卡片用）
summaryLength = 40

[languages.zh-cn]
  label = "简体中文"
  locale = "zh_CN"

[params]
  author = "初牲"
  description = "个人同人创作：文字与插画"
  walineServerURL = "https://waline-lime-nine.vercel.app"  # Waline 评论/浏览量后端；换后端只改这里

# 首页大卡片现在由 content/fandoms/ 这个 collection 动态生成（不再写在这里，
# 方便在 Sveltia CMS 后台增删圈子）。

# ---- 分类 taxonomy ----
[taxonomies]
  fandom = "fandom"   # 圈子（驱动首页大卡片）
  tag = "tags"        # 自由标签（甜文 / AU / BE / HE / R18 …）

[markup.goldmark.renderer]
  unsafe = true  # 允许正文里写 HTML（图说、评论容器等）

[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1
[[menu.main]]
  name = "写文"
  url = "/fiction/"
  weight = 2
[[menu.main]]
  name = "画图"
  url = "/art/"
  weight = 3
